{% extends "../base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5 text-center">
                <div class="card-body py-5">
                    <h1 class="display-4 mb-3">🔍</h1>
                    <h2>Duck Not Found</h2>
                    <p class="lead text-muted">Duck #{{ duck_id }} isn't in our database yet.</p>
                    <hr>
                    <p>Did you find this duck in the wild? You can register it!</p>
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <a href="/mark/{{ duck_id }}" class="btn btn-primary">Register This Duck</a>
                        <a href="/issue/" class="btn btn-outline-secondary">Report an Issue</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
