name: Staging Smoke Tests

on:
  workflow_run:
    workflows: ["Docker Image Build and Push"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging URL to test against"
        default: ""

jobs:
  wait-for-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      STG_BASE_URL: ${{ inputs.base_url || secrets.STG_BASE_URL }}
    outputs:
      sha_match: ${{ steps.poll.outputs.sha_match }}
    steps:
      - name: Wait for new version to be live
        id: poll
        run: |
          if [[ -z "${{ env.STG_BASE_URL }}" ]]; then
            echo "::error::STG_BASE_URL is not configured"
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "sha_match=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXPECTED_SHA="${{ github.event.workflow_run.head_sha }}"
          EXPECTED_SHORT="${EXPECTED_SHA:0:7}"
          HEALTH_URL="${{ env.STG_BASE_URL }}/api/health"
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10
          echo "Waiting for SHA ${EXPECTED_SHORT} at ${HEALTH_URL}..."
          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf "$HEALTH_URL" 2>/dev/null || echo '{}')
            LIVE_SHA=$(echo "$RESPONSE" | jq -r '.sha // .git_sha // "unknown"')
            echo "  Attempt $i/$MAX_ATTEMPTS — live SHA: $LIVE_SHA"
            if [[ "$LIVE_SHA" == "$EXPECTED_SHA" ]] || [[ "$LIVE_SHA" == "$EXPECTED_SHORT"* ]]; then
              echo "sha_match=true" >> "$GITHUB_OUTPUT"
              echo "Deploy confirmed!"
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done
          echo "sha_match=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Timed out waiting for deploy"
          exit 1

  smoke-tests:
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    env:
      STG_BASE_URL: ${{ inputs.base_url || secrets.STG_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install requests pytest pytest-playwright playwright python-dotenv
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - name: Run staging smoke tests
        run: pytest tests/staging/test_smoke.py -v --tb=short
      - name: Run integration tests
        env:
          STG_TEST_USERNAME: ${{ secrets.STG_TEST_USERNAME }}
          STG_TEST_PASSWORD: ${{ secrets.STG_TEST_PASSWORD }}
        run: pytest tests/staging/test_mark_integration.py -v --tb=short
      - name: Close resolved staging issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
              per_page: 50,
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith('Staging smoke test failed')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Resolved — staging smoke tests passed on ${context.sha.substring(0, 7)}.`,
                });
              }
            }
      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.event.workflow_run.head_sha || github.sha }}'.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Staging smoke test failed — ${sha}`,
              body: `Staging smoke tests failed for ${process.env.STG_BASE_URL || 'the configured staging environment'}.`,
              labels: ['bug']
            })
