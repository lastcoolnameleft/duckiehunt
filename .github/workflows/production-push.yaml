name: Production Push

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Staging Smoke Tests"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  promote-to-production:
    name: Promote to production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag latest as prod
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Notify Watchtower
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
            "${{ secrets.WATCHTOWER_URL }}?images=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod"