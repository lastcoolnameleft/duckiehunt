name: ${COMPOSE_PROJECT_NAME:-duckiehunt}

services:
  duckiehunt:
    container_name: ${COMPOSE_PROJECT_NAME:-duckiehunt}
    image: ${IMAGE:-ghcr.io/lastcoolnameleft/duckiehunt:latest}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-duckiehunt.settings}
      DJANGO_DB_DIR: /app/db
      DJANGO_UPLOAD_DIR: /app/uploads
      DJANGO_SETTINGS_DIR: /app/settings
    volumes:
      - ${DATA_DIR:-.}/settings:/app/settings
      - ${DATA_DIR:-.}/db:/app/db
      - ${DATA_DIR:-.}/uploads:/app/uploads
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "duckiehunt.env=${DEPLOY_ENV:-staging}"
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      # Main router
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}.rule=Host(`${TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}.tls.certresolver=myresolver"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-duckiehunt}.loadbalancer.server.port=8000"
      # WWW redirect router
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}-www.rule=Host(`www.${TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}-www.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}-www.tls.certresolver=myresolver"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-duckiehunt}-www.middlewares=${COMPOSE_PROJECT_NAME:-duckiehunt}-www-redirect"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-duckiehunt}-www-redirect.redirectregex.regex=^https://www\\.(.*)"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-duckiehunt}-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-duckiehunt}-www-redirect.redirectregex.permanent=true"
    restart: unless-stopped

  worker:
    container_name: ${COMPOSE_PROJECT_NAME:-duckiehunt}-worker
    image: ${IMAGE:-ghcr.io/lastcoolnameleft/duckiehunt:latest}
    command: python manage.py qcluster
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-duckiehunt.settings}
      DJANGO_DB_DIR: /app/db
      DJANGO_UPLOAD_DIR: /app/uploads
      DJANGO_SETTINGS_DIR: /app/settings
    volumes:
      - ${DATA_DIR:-.}/settings:/app/settings
      - ${DATA_DIR:-.}/db:/app/db
      - ${DATA_DIR:-.}/uploads:/app/uploads
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    depends_on:
      - duckiehunt